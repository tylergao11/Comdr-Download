<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#03050a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#e4e8f0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c8d0e0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g transform="rotate(-15 256 256)">
    <ellipse cx="256" cy="256" rx="180" ry="120" fill="none" stroke="rgba(200,215,235,0.3)" stroke-width="5"/>
    <circle cx="436" cy="256" r="16" fill="url(#core)" opacity="0.5"/>
    <circle cx="436" cy="256" r="6" fill="#fff" opacity="0.9"/>
  </g>

  <circle cx="256" cy="256" r="110" fill="url(#core)" filter="url(#glow)" opacity="0.4"/>
  <circle cx="256" cy="256" r="48" fill="url(#core)" opacity="0.9"/>
</svg>
